<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Theme Toggle</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
  <!-- css -->
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="container d-flex justify-content-center">
    <div class="card shadow-lg p-4 text-center rounded-4 border-0" style="width: 350px;">

      <h2 class="mb-3">Theme Toggle</h2>
      <p class="mb-4">Switch between Light left Dark Mode</p>

      <div class="form-check form-switch d-flex justify-content-center">
        <input class="form-check-input position-relative rounded-pill" type="checkbox" id="themeToggle">
      </div>

    </div>
  </div>

  <script src="./assets/js/bootsrap.bundle.min.js"></script>
  <script src="./assets/js/script.js"></script>

</body>

</html>
